<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Frigurso Canchita</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#4ade80">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
  :root {
    --bg: #0f1a0f;
    --bg2: #162016;
    --bg3: #1e2e1e;
    --card: #1a2a1a;
    --text: #e8f5e8;
    --text2: #a8c8a8;
    --text3: #5a7a5a;
    --accent: #4ade80;
    --accent2: #22c55e;
    --gold: #fbbf24;
    --red: #f87171;
    --blue: #60a5fa;
    --border: #2a3e2a;
    --shadow: 0 2px 12px rgba(0,0,0,0.4);
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --mono: 'SF Mono', 'Fira Code', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100dvh; }
  button { font-family: var(--font); cursor: pointer; border: none; outline: none; }
  input, select, textarea { font-family: var(--font); }

  /* ── NAV BOTTOM ── */
  .nav-bottom {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    background: var(--bg2); border-top: 1px solid var(--border);
    display: flex; height: 58px;
  }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 3px; color: var(--text3); background: transparent;
    font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
    transition: color 0.15s;
  }
  .nav-btn .ni { font-size: 22px; }
  .nav-btn.active { color: var(--accent); }
  .nav-btn:active { opacity: 0.7; }

  /* ── HEADER ── */
  .header {
    position: sticky; top: 0; z-index: 50;
    background: var(--bg2); border-bottom: 1px solid var(--border);
    padding: 12px 16px; display: flex; align-items: center; gap: 10px;
  }
  .header-title { font-size: 18px; font-weight: 800; color: var(--text); flex: 1; }
  .header-sub { font-size: 11px; color: var(--text3); }
  .btn-icon {
    width: 38px; height: 38px; border-radius: 50%;
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--text2); font-size: 18px; display: flex; align-items: center; justify-content: center;
  }

  /* ── PAGES ── */
  .page { display: none; padding-bottom: 70px; }
  .page.active { display: block; }

  /* ── CARDS ── */
  .section { padding: 14px 14px 0; }
  .section-title {
    font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
    color: var(--text3); text-transform: uppercase; margin-bottom: 10px;
  }
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 14px 16px; margin-bottom: 10px; box-shadow: var(--shadow);
  }

  /* ── KPI GRID ── */
  .kpi-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 14px; }
  .kpi-box {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 14px 12px; text-align: center;
  }
  .kpi-val { font-size: 28px; font-weight: 900; color: var(--accent); font-family: var(--mono); }
  .kpi-lbl { font-size: 10px; color: var(--text3); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-top: 3px; }

  /* ── JUGADORES ── */
  .jugador-row {
    display: flex; align-items: center; gap: 12px;
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 11px 14px; margin-bottom: 8px; cursor: pointer; transition: border-color 0.15s;
  }
  .jugador-row:active { border-color: var(--accent); }
  .jugador-avatar {
    width: 42px; height: 42px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 800; color: #0f1a0f; flex-shrink: 0;
  }
  .jugador-nombre { font-size: 15px; font-weight: 700; color: var(--text); }
  .jugador-pos { font-size: 11px; color: var(--text3); }
  .jugador-stats { margin-left: auto; text-align: right; }
  .jugador-goles { font-size: 16px; font-weight: 800; color: var(--gold); font-family: var(--mono); }
  .jugador-goles-lbl { font-size: 9px; color: var(--text3); }

  /* ── PARTIDOS ── */
  .partido-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    margin-bottom: 10px; overflow: hidden;
  }
  .partido-fecha {
    padding: 8px 14px; background: var(--bg3); border-bottom: 1px solid var(--border);
    font-size: 11px; color: var(--text3); font-weight: 600;
  }
  .partido-resultado {
    padding: 14px; display: flex; align-items: center; justify-content: space-between; gap: 8px;
  }
  .partido-equipo { flex: 1; }
  .partido-eq-nombre { font-size: 12px; font-weight: 700; color: var(--text2); margin-bottom: 4px; }
  .partido-eq-nombres { font-size: 10px; color: var(--text3); line-height: 1.4; }
  .partido-marcador {
    font-size: 30px; font-weight: 900; color: var(--text); font-family: var(--mono);
    text-align: center; flex-shrink: 0; padding: 0 12px;
  }
  .partido-eq2 { text-align: right; }
  .partido-goles-lista {
    padding: 0 14px 12px;
    display: flex; flex-wrap: wrap; gap: 5px;
  }
  .gol-chip {
    background: rgba(251,191,36,0.12); border: 1px solid rgba(251,191,36,0.25);
    color: var(--gold); font-size: 10px; font-weight: 700;
    padding: 3px 9px; border-radius: 99px;
  }

  /* ── ESTADÍSTICAS ── */
  .stats-tabla { width: 100%; border-collapse: collapse; }
  .stats-tabla th {
    text-align: left; padding: 6px 10px; font-size: 9px; font-weight: 700;
    color: var(--text3); text-transform: uppercase; letter-spacing: 1px;
    border-bottom: 1px solid var(--border);
  }
  .stats-tabla td { padding: 9px 10px; border-bottom: 1px solid var(--border); font-size: 13px; }
  .stats-tabla tr:last-child td { border-bottom: none; }
  .rank-1 { color: var(--gold); font-weight: 800; }
  .rank-2 { color: #e2e8f0; font-weight: 700; }
  .rank-3 { color: #cd7c39; font-weight: 700; }

  /* ── MODALS / FORMULARIOS ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200;
    display: flex; align-items: flex-end; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--bg2); border-radius: 20px 20px 0 0; width: 100%; max-width: 520px;
    padding: 20px 18px 30px; border-top: 1px solid var(--border);
    transform: translateY(100%); transition: transform 0.25s;
    max-height: 90dvh; overflow-y: auto;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-title { font-size: 17px; font-weight: 800; color: var(--text); margin-bottom: 16px; }
  .field-label { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
  .field-wrap { margin-bottom: 14px; }
  .input {
    width: 100%; padding: 12px 14px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--bg3); color: var(--text);
    font-size: 15px;
  }
  .input:focus { outline: none; border-color: var(--accent); }
  select.input option { background: var(--bg3); color: var(--text); }
  .btn-primary {
    width: 100%; padding: 14px; border-radius: 12px;
    background: var(--accent); color: #0f1a0f; font-size: 15px; font-weight: 800;
    margin-bottom: 8px;
  }
  .btn-primary:active { opacity: 0.85; }
  .btn-ghost {
    width: 100%; padding: 12px; border-radius: 12px;
    border: 1px solid var(--border); background: transparent; color: var(--text3);
    font-size: 14px; font-weight: 600;
  }
  .btn-danger {
    width: 100%; padding: 12px; border-radius: 12px;
    background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3);
    color: var(--red); font-size: 14px; font-weight: 700; margin-bottom: 8px;
  }
  .pill-sel {
    display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px;
  }
  .pill {
    padding: 7px 14px; border-radius: 99px; font-size: 12px; font-weight: 600;
    border: 1px solid var(--border); background: var(--bg3); color: var(--text2);
    cursor: pointer; transition: all 0.15s;
  }
  .pill.sel { background: rgba(74,222,128,0.15); border-color: var(--accent); color: var(--accent); font-weight: 700; }
  .pill:active { opacity: 0.75; }
  .goles-lista-editar { display: flex; flex-direction: column; gap: 5px; margin-top: 6px; }
  .gol-row { display: flex; align-items: center; gap: 8px; }
  .gol-row select.input { flex: 1; padding: 8px 10px; }
  .gol-row button { flex-shrink: 0; width: 32px; height: 32px; border-radius: 8px; background: rgba(248,113,113,0.15); color: var(--red); border: none; font-size: 16px; display: flex; align-items: center; justify-content: center; }

  /* ── FAB ── */
  .fab {
    position: fixed; bottom: 70px; right: 16px; z-index: 80;
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--accent); color: #0f1a0f;
    font-size: 28px; font-weight: 400; box-shadow: 0 4px 16px rgba(74,222,128,0.4);
    display: flex; align-items: center; justify-content: center;
  }
  .fab:active { transform: scale(0.93); }

  /* ── CANCHA VISUAL ── */
  .cancha-svg { width: 100%; max-width: 360px; margin: 0 auto; display: block; }
  .pos-btn {
    background: var(--bg3); border: 1px solid var(--border); border-radius: 99px;
    padding: 6px 12px; font-size: 11px; font-weight: 700; color: var(--text2);
    display: inline-flex; align-items: center; gap: 5px; margin: 3px;
    cursor: pointer;
  }
  .pos-btn.ok { background: rgba(74,222,128,0.12); border-color: var(--accent); color: var(--accent); }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 75px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--accent); color: #0f1a0f; padding: 9px 20px; border-radius: 99px;
    font-size: 13px; font-weight: 700; opacity: 0; transition: all 0.25s; z-index: 9999;
    white-space: nowrap; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .empty { text-align: center; padding: 50px 20px; }
  .empty-icon { font-size: 56px; margin-bottom: 12px; }
  .empty-text { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .empty-sub { font-size: 12px; color: var(--text3); }
  .sep { height: 1px; background: var(--border); margin: 8px 0; }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 10px; font-weight: 700; }
  .tag-g { background: rgba(74,222,128,0.15); color: var(--accent); }
  .tag-r { background: rgba(248,113,113,0.15); color: var(--red); }
</style>
</head>
<body>

<!-- NAV INFERIOR -->
<nav class="nav-bottom">
  <button class="nav-btn active" id="nav-home" onclick="navGo('home',this)">
    <span class="ni">🏠</span><span>Inicio</span>
  </button>
  <button class="nav-btn" id="nav-jugadores" onclick="navGo('jugadores',this)">
    <span class="ni">👥</span><span>Jugadores</span>
  </button>
  <button class="nav-btn" id="nav-partidos" onclick="navGo('partidos',this)">
    <span class="ni">⚽</span><span>Partidos</span>
  </button>
  <button class="nav-btn" id="nav-stats" onclick="navGo('stats',this)">
    <span class="ni">📊</span><span>Stats</span>
  </button>
</nav>

<!-- ── HOME ── -->
<div class="page active" id="page-home">
  <div class="header">
    <div>
      <div class="header-title">⚽ Frigurso Canchita</div>
      <div class="header-sub" id="home-sub">Cargando...</div>
    </div>
  </div>
  <div class="kpi-grid" id="kpi-grid"></div>
  <div class="section">
    <div class="section-title">Último partido</div>
    <div id="ultimo-partido"></div>
  </div>
  <div class="section" style="margin-top:6px">
    <div class="section-title">Top goleadores</div>
    <div id="top-goleadores"></div>
  </div>
</div>

<!-- ── JUGADORES ── -->
<div class="page" id="page-jugadores">
  <div class="header">
    <div class="header-title">👥 Jugadores</div>
  </div>
  <div style="padding:14px" id="jugadores-lista"></div>
</div>
<button class="fab" id="fab-jugadores" style="display:none" onclick="abrirModalJugador()">＋</button>

<!-- ── PARTIDOS ── -->
<div class="page" id="page-partidos">
  <div class="header">
    <div class="header-title">⚽ Partidos</div>
  </div>
  <div style="padding:14px" id="partidos-lista"></div>
</div>
<button class="fab" id="fab-partidos" style="display:none" onclick="abrirModalPartido()">＋</button>

<!-- ── STATS ── -->
<div class="page" id="page-stats">
  <div class="header">
    <div class="header-title">📊 Estadísticas</div>
  </div>
  <div style="padding:14px">
    <div class="section-title">Ranking de goleadores</div>
    <div class="card" style="padding:0;overflow:hidden">
      <table class="stats-tabla" id="stats-goles"></table>
    </div>
    <div class="section-title" style="margin-top:14px">Más partidos jugados</div>
    <div class="card" style="padding:0;overflow:hidden">
      <table class="stats-tabla" id="stats-partidos"></table>
    </div>
  </div>
</div>

<!-- ── MODAL: JUGADOR ── -->
<div class="modal-overlay" id="modal-jugador" onclick="if(event.target===this)cerrarModal('jugador')">
  <div class="modal">
    <div class="modal-title" id="modal-jugador-title">Nuevo jugador</div>
    <input type="hidden" id="j-id">
    <div class="field-wrap">
      <div class="field-label">Nombre</div>
      <input type="text" class="input" id="j-nombre" placeholder="Ej: Messi">
    </div>
    <div class="field-wrap">
      <div class="field-label">Posición</div>
      <select class="input" id="j-pos">
        <option value="">Sin posición</option>
        <option value="Arquero">Arquero</option>
        <option value="Defensor">Defensor</option>
        <option value="Mediocampista">Mediocampista</option>
        <option value="Delantero">Delantero</option>
      </select>
    </div>
    <div class="field-wrap">
      <div class="field-label">Número (opcional)</div>
      <input type="number" class="input" id="j-num" placeholder="10" min="1" max="99">
    </div>
    <button class="btn-primary" onclick="guardarJugador()">Guardar</button>
    <button class="btn-danger" id="btn-borrar-jugador" onclick="borrarJugador()" style="display:none">🗑 Borrar jugador</button>
    <button class="btn-ghost" onclick="cerrarModal('jugador')">Cancelar</button>
  </div>
</div>

<!-- ── MODAL: PARTIDO ── -->
<div class="modal-overlay" id="modal-partido" onclick="if(event.target===this)cerrarModal('partido')">
  <div class="modal">
    <div class="modal-title" id="modal-partido-title">Nuevo partido</div>
    <input type="hidden" id="p-id">
    <div class="field-wrap">
      <div class="field-label">Fecha</div>
      <input type="date" class="input" id="p-fecha">
    </div>
    <div class="field-wrap">
      <div class="field-label">⚪ Equipo 1 — jugadores</div>
      <div class="pill-sel" id="p-eq1-pills"></div>
    </div>
    <div class="field-wrap">
      <div class="field-label">⚫ Equipo 2 — jugadores</div>
      <div class="pill-sel" id="p-eq2-pills"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 40px 1fr;gap:8px;align-items:center;margin-bottom:14px">
      <div>
        <div class="field-label">Goles EQ1</div>
        <input type="number" class="input" id="p-g1" value="0" min="0" max="99" oninput="updateGolesInput()">
      </div>
      <div style="text-align:center;color:var(--text3);font-weight:800;padding-top:18px">—</div>
      <div>
        <div class="field-label">Goles EQ2</div>
        <input type="number" class="input" id="p-g2" value="0" min="0" max="99" oninput="updateGolesInput()">
      </div>
    </div>
    <div class="field-wrap">
      <div class="field-label">⚽ Goleadores</div>
      <div id="goles-editar" class="goles-lista-editar"></div>
      <button onclick="agregarFilaGol()" style="margin-top:8px;padding:7px 14px;border-radius:8px;background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.25);color:var(--accent);font-size:12px;font-weight:700">+ Agregar goleador</button>
    </div>
    <button class="btn-primary" onclick="guardarPartido()">Guardar partido</button>
    <button class="btn-danger" id="btn-borrar-partido" onclick="borrarPartido()" style="display:none">🗑 Borrar partido</button>
    <button class="btn-ghost" onclick="cerrarModal('partido')">Cancelar</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ─── STORAGE ───────────────────────────────────────────────────
const KEY = 'canchita_v1';
let DB = { jugadores: [], partidos: [] };

function save() { try { localStorage.setItem(KEY, JSON.stringify(DB)); } catch(e) {} }
function load() {
  try {
    const d = JSON.parse(localStorage.getItem(KEY) || 'null');
    if (d && d.jugadores) DB = d;
  } catch(e) {}
}

// ─── NAV ───────────────────────────────────────────────────────
let _pagActual = 'home';
function navGo(page, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.fab').forEach(f => f.style.display = 'none');
  document.getElementById('page-'+page).classList.add('active');
  if (btn) btn.classList.add('active');
  _pagActual = page;
  if (page === 'home') renderHome();
  if (page === 'jugadores') { renderJugadores(); document.getElementById('fab-jugadores').style.display = ''; }
  if (page === 'partidos')  { renderPartidos();  document.getElementById('fab-partidos').style.display = ''; }
  if (page === 'stats') renderStats();
  window.scrollTo(0, 0);
}

// ─── UTILS ─────────────────────────────────────────────────────
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function iniciales(nombre) { return nombre.trim().split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase() || '?'; }
function getNombre(id) { const j = DB.jugadores.find(j=>j.id===id); return j ? j.nombre : '?'; }
function fmtFecha(s) {
  if (!s) return '';
  const [y,m,d] = s.split('-');
  return d+'/'+m+'/'+y;
}
let _toastT;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_toastT);
  _toastT = setTimeout(() => el.classList.remove('show'), 2600);
}

// ─── STATS HELPERS ─────────────────────────────────────────────
function computeStats() {
  const goles = {};
  const jugados = {};
  DB.jugadores.forEach(j => { goles[j.id] = 0; jugados[j.id] = 0; });
  DB.partidos.forEach(p => {
    [...(p.eq1||[]), ...(p.eq2||[])].forEach(id => { if (jugados[id] !== undefined) jugados[id]++; });
    (p.goles||[]).forEach(g => { if (goles[g.jugId] !== undefined) goles[g.jugId]++; });
  });
  return { goles, jugados };
}

// ─── HOME ──────────────────────────────────────────────────────
function renderHome() {
  const stats = computeStats();
  const totalGoles = Object.values(stats.goles).reduce((s,v)=>s+v,0);

  document.getElementById('home-sub').textContent =
    DB.jugadores.length + ' jugadores · ' + DB.partidos.length + ' partidos';

  document.getElementById('kpi-grid').innerHTML = [
    ['⚽', totalGoles, 'Goles totales'],
    ['🏃', DB.jugadores.length, 'Jugadores'],
    ['🗓', DB.partidos.length, 'Partidos'],
    ['🏆', DB.partidos.filter(p=>(p.g1||0)!==(p.g2||0)).length, 'Con ganador'],
  ].map(([icon, val, lbl]) =>
    '<div class="kpi-box">'+
    '<div class="kpi-val">'+icon+' '+val+'</div>'+
    '<div class="kpi-lbl">'+lbl+'</div>'+
    '</div>'
  ).join('');

  // Último partido
  const up = [...DB.partidos].sort((a,b)=>b.fecha>a.fecha?1:-1)[0];
  const upEl = document.getElementById('ultimo-partido');
  if (up) {
    upEl.innerHTML = renderPartidoCard(up);
  } else {
    upEl.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text3)">Todavía no hay partidos</div>';
  }

  // Top goleadores
  const topEl = document.getElementById('top-goleadores');
  const topG = DB.jugadores
    .map(j => ({j, g: stats.goles[j.id]||0}))
    .filter(x => x.g > 0)
    .sort((a,b)=>b.g-a.g)
    .slice(0, 5);
  if (topG.length) {
    topEl.innerHTML = topG.map((x, i) =>
      '<div class="jugador-row" style="cursor:default">'+
      '<div class="jugador-avatar" style="font-size:13px;background:'+(i===0?'linear-gradient(135deg,#fbbf24,#f59e0b)':i===1?'linear-gradient(135deg,#e2e8f0,#94a3b8)':i===2?'linear-gradient(135deg,#cd7c39,#a0522d)':'var(--bg3)')+';color:'+(i<3?'#0f1a0f':'var(--text2)')+'">'+
        (i===0?'🥇':i===1?'🥈':i===2?'🥉':iniciales(x.j.nombre))+
      '</div>'+
      '<div>'+
        '<div class="jugador-nombre">'+esc(x.j.nombre)+'</div>'+
        '<div class="jugador-pos">'+(x.j.posicion||'—')+'</div>'+
      '</div>'+
      '<div class="jugador-stats">'+
        '<div class="jugador-goles">'+x.g+' ⚽</div>'+
      '</div>'+
      '</div>'
    ).join('');
  } else {
    topEl.innerHTML = '<div style="text-align:center;padding:16px;color:var(--text3);font-size:13px">Sin goles registrados</div>';
  }
}

// ─── JUGADORES ─────────────────────────────────────────────────
function renderJugadores() {
  const el = document.getElementById('jugadores-lista');
  if (!DB.jugadores.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">👤</div><div class="empty-text">Sin jugadores</div><div class="empty-sub">Tocá + para agregar</div></div>';
    return;
  }
  const stats = computeStats();
  el.innerHTML = DB.jugadores.map(j =>
    '<div class="jugador-row" onclick="abrirModalJugador(\''+j.id+'\')">'+
    '<div class="jugador-avatar">'+iniciales(j.nombre)+'</div>'+
    '<div>'+
      '<div class="jugador-nombre">'+(j.numero?'#'+j.numero+' ':'')+esc(j.nombre)+'</div>'+
      '<div class="jugador-pos">'+(j.posicion||'Sin posición')+'</div>'+
    '</div>'+
    '<div class="jugador-stats">'+
      '<div class="jugador-goles">'+(stats.goles[j.id]||0)+' ⚽</div>'+
      '<div class="jugador-goles-lbl">'+(stats.jugados[j.id]||0)+' partidos</div>'+
    '</div>'+
    '</div>'
  ).join('');
}

function abrirModalJugador(id) {
  const j = id ? DB.jugadores.find(x=>x.id===id) : null;
  document.getElementById('j-id').value = j ? j.id : '';
  document.getElementById('j-nombre').value = j ? j.nombre : '';
  document.getElementById('j-pos').value = j ? (j.posicion||'') : '';
  document.getElementById('j-num').value = j ? (j.numero||'') : '';
  document.getElementById('modal-jugador-title').textContent = j ? 'Editar jugador' : 'Nuevo jugador';
  document.getElementById('btn-borrar-jugador').style.display = j ? '' : 'none';
  abrirModal('jugador');
  setTimeout(() => document.getElementById('j-nombre').focus(), 300);
}

function guardarJugador() {
  const nombre = document.getElementById('j-nombre').value.trim();
  if (!nombre) { toast('⚠️ Ingresá un nombre'); return; }
  const id = document.getElementById('j-id').value;
  const data = {
    id: id || uid(),
    nombre,
    posicion: document.getElementById('j-pos').value,
    numero: parseInt(document.getElementById('j-num').value) || null,
  };
  if (id) {
    const idx = DB.jugadores.findIndex(j=>j.id===id);
    if (idx>=0) DB.jugadores[idx] = data;
  } else {
    DB.jugadores.push(data);
  }
  save();
  cerrarModal('jugador');
  renderJugadores();
  toast('✅ ' + nombre + (id ? ' actualizado' : ' agregado'));
}

function borrarJugador() {
  const id = document.getElementById('j-id').value;
  const j = DB.jugadores.find(x=>x.id===id);
  if (!j || !confirm('¿Borrar a '+j.nombre+'?')) return;
  DB.jugadores = DB.jugadores.filter(x=>x.id!==id);
  // limpiar goles y apariciones
  DB.partidos.forEach(p => {
    p.eq1 = (p.eq1||[]).filter(x=>x!==id);
    p.eq2 = (p.eq2||[]).filter(x=>x!==id);
    p.goles = (p.goles||[]).filter(g=>g.jugId!==id);
  });
  save();
  cerrarModal('jugador');
  renderJugadores();
  toast('🗑 '+j.nombre+' eliminado');
}

// ─── PARTIDOS ──────────────────────────────────────────────────
function renderPartidoCard(p) {
  const eq1Names = (p.eq1||[]).map(getNombre).join(', ') || '—';
  const eq2Names = (p.eq2||[]).map(getNombre).join(', ') || '—';
  const golesHtml = (p.goles||[]).length
    ? (p.goles||[]).map(g=>'<span class="gol-chip">⚽ '+esc(getNombre(g.jugId))+'</span>').join('')
    : '<span style="font-size:11px;color:var(--text3)">Sin goleadores registrados</span>';
  const g1 = p.g1||0, g2 = p.g2||0;
  const col1 = g1>g2?'var(--accent)':g1<g2?'var(--red)':'var(--text)';
  const col2 = g2>g1?'var(--accent)':g2<g1?'var(--red)':'var(--text)';
  return '<div class="partido-card" onclick="abrirModalPartido(\''+p.id+'\')">'+
    '<div class="partido-fecha">🗓 '+fmtFecha(p.fecha)+'</div>'+
    '<div class="partido-resultado">'+
      '<div class="partido-equipo">'+
        '<div class="partido-eq-nombre">⚪ Equipo 1</div>'+
        '<div class="partido-eq-nombres">'+esc(eq1Names)+'</div>'+
      '</div>'+
      '<div class="partido-marcador"><span style="color:'+col1+'">'+g1+'</span> - <span style="color:'+col2+'">'+g2+'</span></div>'+
      '<div class="partido-equipo partido-eq2">'+
        '<div class="partido-eq-nombre">Equipo 2 ⚫</div>'+
        '<div class="partido-eq-nombres">'+esc(eq2Names)+'</div>'+
      '</div>'+
    '</div>'+
    '<div class="partido-goles-lista">'+golesHtml+'</div>'+
  '</div>';
}

function renderPartidos() {
  const el = document.getElementById('partidos-lista');
  const partidos = [...DB.partidos].sort((a,b)=>b.fecha>a.fecha?1:-1);
  if (!partidos.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">⚽</div><div class="empty-text">Sin partidos</div><div class="empty-sub">Tocá + para cargar uno</div></div>';
    return;
  }
  el.innerHTML = partidos.map(p => renderPartidoCard(p)).join('');
}

// ── MODAL PARTIDO ──
let _eq1Sel = [], _eq2Sel = [], _golesEditar = [];

function abrirModalPartido(id) {
  const p = id ? DB.partidos.find(x=>x.id===id) : null;
  document.getElementById('p-id').value = p ? p.id : '';
  document.getElementById('p-fecha').value = p ? p.fecha : new Date().toISOString().slice(0,10);
  document.getElementById('modal-partido-title').textContent = p ? 'Editar partido' : 'Nuevo partido';
  document.getElementById('btn-borrar-partido').style.display = p ? '' : 'none';

  _eq1Sel = p ? [...(p.eq1||[])] : [];
  _eq2Sel = p ? [...(p.eq2||[])] : [];
  _golesEditar = p ? (p.goles||[]).map(g=>({...g})) : [];

  document.getElementById('p-g1').value = p ? (p.g1||0) : 0;
  document.getElementById('p-g2').value = p ? (p.g2||0) : 0;

  renderPillsEq();
  renderGolesEditar();
  abrirModal('partido');
}

function renderPillsEq() {
  const render = (containerId, selArr, otroArr, eq) => {
    const c = document.getElementById(containerId);
    c.innerHTML = DB.jugadores.map(j => {
      const enOtro = otroArr.includes(j.id);
      const sel = selArr.includes(j.id);
      return '<button class="pill '+(sel?'sel':'')+'" '+(enOtro?'disabled style="opacity:0.35"':'')+' onclick="toggleEq(\''+j.id+'\','+eq+')">'+esc(j.nombre)+'</button>';
    }).join('');
  };
  render('p-eq1-pills', _eq1Sel, _eq2Sel, 1);
  render('p-eq2-pills', _eq2Sel, _eq1Sel, 2);
}

function toggleEq(jugId, eq) {
  if (eq === 1) {
    if (_eq1Sel.includes(jugId)) _eq1Sel = _eq1Sel.filter(x=>x!==jugId);
    else _eq1Sel.push(jugId);
  } else {
    if (_eq2Sel.includes(jugId)) _eq2Sel = _eq2Sel.filter(x=>x!==jugId);
    else _eq2Sel.push(jugId);
  }
  renderPillsEq();
}

function updateGolesInput() { renderGolesEditar(); }

function renderGolesEditar() {
  const g1 = parseInt(document.getElementById('p-g1').value) || 0;
  const g2 = parseInt(document.getElementById('p-g2').value) || 0;
  const totalGoles = g1 + g2;
  const allJugs = DB.jugadores.filter(j => _eq1Sel.includes(j.id) || _eq2Sel.includes(j.id));
  const c = document.getElementById('goles-editar');

  // Ensure we have enough gol rows
  while (_golesEditar.length < totalGoles) _golesEditar.push({ jugId: '', eq: 1 });
  if (_golesEditar.length > totalGoles) _golesEditar = _golesEditar.slice(0, totalGoles);

  if (!allJugs.length) {
    c.innerHTML = '<div style="font-size:12px;color:var(--text3)">Seleccioná los jugadores primero</div>';
    return;
  }

  c.innerHTML = _golesEditar.map((g, i) => {
    const opts = allJugs.map(j => '<option value="'+j.id+'" '+(g.jugId===j.id?'selected':'')+'>'+esc(j.nombre)+'</option>').join('');
    return '<div class="gol-row">'+
      '<select class="input" onchange="_golesEditar['+i+'].jugId=this.value">'+
        '<option value="">— Jugador —</option>'+opts+
      '</select>'+
      '<button onclick="_golesEditar.splice('+i+',1);renderGolesEditar()">✕</button>'+
    '</div>';
  }).join('');
}

function agregarFilaGol() {
  _golesEditar.push({ jugId: '', eq: 1 });
  renderGolesEditar();
}

function guardarPartido() {
  const fecha = document.getElementById('p-fecha').value;
  if (!fecha) { toast('⚠️ Ingresá la fecha'); return; }
  const g1 = parseInt(document.getElementById('p-g1').value) || 0;
  const g2 = parseInt(document.getElementById('p-g2').value) || 0;
  const id = document.getElementById('p-id').value;

  const goles = _golesEditar.filter(g => g.jugId);

  const data = {
    id: id || uid(),
    fecha, g1, g2,
    eq1: [..._eq1Sel],
    eq2: [..._eq2Sel],
    goles,
  };
  if (id) {
    const idx = DB.partidos.findIndex(p=>p.id===id);
    if (idx>=0) DB.partidos[idx] = data;
  } else {
    DB.partidos.push(data);
  }
  save();
  cerrarModal('partido');
  renderPartidos();
  toast('✅ Partido guardado');
}

function borrarPartido() {
  const id = document.getElementById('p-id').value;
  if (!id || !confirm('¿Borrar este partido?')) return;
  DB.partidos = DB.partidos.filter(p=>p.id!==id);
  save();
  cerrarModal('partido');
  renderPartidos();
  toast('🗑 Partido eliminado');
}

// ─── STATS ─────────────────────────────────────────────────────
function renderStats() {
  const stats = computeStats();

  // Goleadores
  const golTop = DB.jugadores.map(j => ({j, g: stats.goles[j.id]||0})).sort((a,b)=>b.g-a.g);
  const gEl = document.getElementById('stats-goles');
  gEl.innerHTML = '<tr><th>#</th><th>Jugador</th><th>Posición</th><th style="text-align:right">Goles ⚽</th></tr>' +
    (golTop.length ? golTop.map((x, i) =>
      '<tr><td class="'+(i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'')+'">'+(i+1)+'</td>'+
      '<td style="font-weight:700">'+esc(x.j.nombre)+'</td>'+
      '<td style="color:var(--text3)">'+esc(x.j.posicion||'—')+'</td>'+
      '<td style="text-align:right;font-family:var(--mono);font-weight:800;color:var(--gold)">'+x.g+'</td></tr>'
    ).join('') : '<tr><td colspan="4" style="text-align:center;padding:20px;color:var(--text3)">Sin datos</td></tr>');

  // Más jugados
  const jugTop = DB.jugadores.map(j => ({j, n: stats.jugados[j.id]||0})).sort((a,b)=>b.n-a.n);
  const pEl = document.getElementById('stats-partidos');
  pEl.innerHTML = '<tr><th>#</th><th>Jugador</th><th style="text-align:right">Partidos 🗓</th></tr>' +
    (jugTop.length ? jugTop.map((x, i) =>
      '<tr><td class="'+(i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'')+'">'+(i+1)+'</td>'+
      '<td style="font-weight:700">'+esc(x.j.nombre)+'</td>'+
      '<td style="text-align:right;font-family:var(--mono);font-weight:800;color:var(--accent)">'+x.n+'</td></tr>'
    ).join('') : '<tr><td colspan="3" style="text-align:center;padding:20px;color:var(--text3)">Sin datos</td></tr>');
}

// ─── MODALS ────────────────────────────────────────────────────
function abrirModal(id) { document.getElementById('modal-'+id).classList.add('open'); }
function cerrarModal(id) { document.getElementById('modal-'+id).classList.remove('open'); }

// ─── INIT ──────────────────────────────────────────────────────
function init() {
  load();
  renderHome();
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
}

init();
</script>
